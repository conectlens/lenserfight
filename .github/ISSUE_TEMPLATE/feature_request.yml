name: Feature request
description: Propose a focused improvement for LenserFight Community Edition.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or developer pain are you addressing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why did you rule them out?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? List observable behaviors or test cases.
      placeholder: |
        - [ ] /battles/browse shows a "Create" button for authenticated users
        - [ ] Unauthenticated users see "Sign in to create"
        - [ ] pgTAP plan(1) passes for the underlying RPC change
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Mention if this touches migrations, CLI, SDK, docs, mobile, or other surfaces.
