name: Install problem
description: Report a setup or local install issue.
title: "install: "
labels:
  - p0-install
body:
  - type: textarea
    id: failing_step
    attributes:
      label: Failing step
      description: Which setup step failed?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and output
      description: Paste the exact command and the important error output.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, Docker version, Supabase CLI version.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Anything you already tried, including `supabase:local:recover` if relevant.
