name: Adapter / Connector Idea
description: Propose a new connector adapter before implementing. Use this to claim a slug and confirm scope before writing code.
labels: ["adapter-idea", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new connector adapter. A mentor will reply within 5 business days confirming whether the slug is taken, whether the scope set is reasonable, and whether the auth model has a precedent. See [Adapter Mentorship Paths](https://docs.lenserfight.com/how-to/contributors/adapter-mentorship) for what to expect.

        **Do not** use this template to report bugs in an existing adapter — use the **Adapter / Connector Bug** template instead.

  - type: input
    id: adapter_slug
    attributes:
      label: Proposed adapter slug
      description: Stable kebab-case identifier. Must not collide with anything in `examples/connectors/`.
      placeholder: e.g. github-issues, slack-events, my-service
    validations:
      required: true

  - type: input
    id: target_service
    attributes:
      label: Target service
      description: The upstream system this adapter integrates with.
      placeholder: e.g. GitHub Issues API, Slack Events API
    validations:
      required: true

  - type: dropdown
    id: auth_model
    attributes:
      label: Auth model
      description: How users authenticate to the upstream service.
      options:
        - Static API token (single-tenant)
        - Per-user API token
        - OAuth 2.0 — installation token
        - OAuth 2.0 — user token (refresh required)
        - HMAC signing (no upstream token)
        - Other / not yet decided
    validations:
      required: true

  - type: textarea
    id: scopes_needed
    attributes:
      label: Scopes needed
      description: |
        Which v1 scopes does the adapter require? See [Token Scopes (v1)](https://docs.lenserfight.com/reference/connectors/scopes). If the adapter would need a new top-level scope, say so explicitly — that requires an RFC before implementation.
      placeholder: |
        - lenses:read
        - workflows:write
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Value to LenserFight users
      description: Why does this adapter belong in LenserFight? What workflow does it unlock?
      placeholder: |
        - Lets agents post to GitHub Issues from a workflow result.
        - Closes the gap between …
    validations:
      required: true

  - type: dropdown
    id: willing_to_implement
    attributes:
      label: Willing to implement?
      description: Are you proposing this so you can build it, or are you flagging the gap for someone else?
      options:
        - "Yes — I plan to open the PR myself"
        - "Maybe — I can scaffold but need a mentor pairing"
        - "No — I'm only flagging the gap"
    validations:
      required: true

  - type: textarea
    id: prior_art
    attributes:
      label: Prior art
      description: Existing adapters this would be modeled on (e.g. `examples/connectors/chainabit-example`). Optional.
    validations:
      required: false
