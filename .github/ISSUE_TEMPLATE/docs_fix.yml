name: Docs fix
description: Report a documentation bug or propose a docs correction.
title: "docs: "
labels:
  - docs
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link to the docs page or repo file.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, wrong, outdated, or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed fix
      description: Describe the change you want to make.
