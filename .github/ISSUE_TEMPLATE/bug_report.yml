name: Bug report
description: Report a product or code bug in LenserFight Community Edition.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation already tried
      description: Mention tests, commands, or manual checks you already ran.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, and anything else relevant.
