name: Bug report
description: Report a product or code bug in LenserFight Community Edition.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Go to /battles/browse
        2. Click "Create battle"
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Node version, Supabase CLI version, browser (for UI bugs)."
      placeholder: "macOS 14.4, Node 20.11, Supabase CLI 1.150, Chrome 124"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant terminal output, console errors, or network responses.
      render: text
