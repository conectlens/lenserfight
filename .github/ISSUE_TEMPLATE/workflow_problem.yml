name: Workflow problem
description: Report a workflow run, builder, or execution-engine issue.
title: "workflow: "
labels:
  - p0-workflow
body:
  - type: textarea
    id: scenario
    attributes:
      label: Workflow scenario
      description: Describe what you tried to run (template name, custom workflow, etc.).
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened vs what you expected
    validations:
      required: true
  - type: input
    id: run_id
    attributes:
      label: Run ID (if available)
      description: From the run history drawer or `lf execution list`.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error_message
      description: Paste node_results error_message or worker output if you have it.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Edition (community/cloud), Node, pnpm, Supabase CLI version.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
