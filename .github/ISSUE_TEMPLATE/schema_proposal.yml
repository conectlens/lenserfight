name: Schema / Migration Proposal
description: Propose a database schema change, new migration, or RLS policy update.
labels: ["schema-proposal", "area:supabase", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Schema changes require an RFC-style review before implementation. Please be specific — include the exact table(s) affected, a migration sketch, and the RLS impact. Changes that touch `lensers.*`, `agents.*`, or `platform.*` schemas require a core maintainer sign-off.

  - type: input
    id: table_affected
    attributes:
      label: Table(s) affected
      description: Which Supabase tables or schemas does this proposal touch?
      placeholder: e.g. lenses.workflow_schedules, platform.system_flags
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this schema change needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: migration_draft
    attributes:
      label: Migration draft (SQL)
      description: Paste a rough SQL sketch of the migration. It does not need to be production-ready yet.
      render: sql
    validations:
      required: false

  - type: textarea
    id: rls_considerations
    attributes:
      label: RLS considerations
      description: Does this change require new or updated Row Level Security policies? Which roles are affected?
      placeholder: |
        - SELECT: authenticated users can only see rows where lenser_id = auth.uid()
        - INSERT/UPDATE: only via SECURITY DEFINER RPC fn_...
        - service_role bypass: required for worker
    validations:
      required: true

  - type: textarea
    id: rollback_plan
    attributes:
      label: Rollback plan
      description: How can this migration be safely rolled back if needed?
      placeholder: |
        - DROP the new column / table (no data loss)
        - Reverse the pg_cron schedule change with SELECT cron.unschedule(...)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have checked that a similar migration does not already exist
          required: true
        - label: I understand that breaking schema changes require a core maintainer review
          required: true
        - label: I have considered the blast radius (which other tables, RLS policies, or RPCs are affected)
          required: true
