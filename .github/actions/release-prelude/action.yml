name: Release prelude
description: >
  Release-job bootstrap — validates BOT_PAT presence (unless dry-run), checks
  out with BOT_PAT for protected-branch push authority, sets up pnpm + Node
  with the npm registry URL, installs deps, and configures git identity.
  Composes setup-workspace.

inputs:
  dry_run:
    description: When 'true', the BOT_PAT prerequisite check and git identity config are skipped.
    required: true
  bot_pat:
    description: Personal access token with repo scope and branch-protection bypass. Pass secrets.BOT_PAT.
    required: true
  github_token:
    description: Fallback GitHub token for dry-run checkouts. Pass secrets.GITHUB_TOKEN or github.token.
    required: true
  node-version:
    description: Node.js version.
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - name: Check release prerequisites
      if: inputs.dry_run != 'true'
      shell: bash
      env:
        BOT_PAT: ${{ inputs.bot_pat }}
      run: |
        set -euo pipefail
        if [[ -z "$BOT_PAT" ]]; then
          echo "::error::BOT_PAT secret is not set. A PAT with repo scope and branch-protection bypass is required to push release commits to the protected main branch."
          exit 1
        fi

    - name: Setup workspace
      uses: ./.github/actions/setup-workspace
      with:
        fetch-depth: '0'
        persist-credentials: 'true'
        token: ${{ inputs.bot_pat != '' && inputs.bot_pat || inputs.github_token }}
        registry-url: https://registry.npmjs.org
        node-version: ${{ inputs.node-version }}

    - name: Configure git identity
      if: inputs.dry_run != 'true'
      shell: bash
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
