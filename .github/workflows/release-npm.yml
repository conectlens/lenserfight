name: Release npm packages (sdk)

on:
  # Auto-release fires after smoke-timing (the longer gate) passes on main.
  # coverage-gate runs in parallel and typically finishes first, so by the time
  # smoke-timing completes both gates have had a chance to fail.
  # Using a single trigger avoids double-firing (workflow_run is OR, not AND).
  workflow_run:
    workflows:
      - smoke-timing
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview versioning and npm publish without changing git or npm.
        required: true
        type: boolean
        default: true
      first_release:
        description: Use only for the very first release (no prior nx-managed git tag exists).
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  # Shared group with release-cli so both workflows serialize on the same branch.
  # cancel-in-progress: false — never cancel a release mid-flight.
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: ${{ (inputs.dry_run == 'true' || inputs.dry_run == true) && 'Preview' || 'Publish' }} sdk
    runs-on: ubuntu-latest
    environment: npm-release
    # Skip when triggered by a release/skip-ci commit to break the re-release loop.
    # workflow_run.head_commit.message reflects the HEAD at CI completion time; checking
    # it here prevents re-releasing when the contributors sync or a prior release pushed
    # a [skip ci] commit between CI start and finish.
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):') &&
        !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
      )

    steps:
      - name: Resolve effective inputs
        id: effective
        shell: bash
        run: |
          echo "dry_run=${{ inputs.dry_run == '' && 'false' || inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          echo "first_release=${{ inputs.first_release == '' && 'false' || inputs.first_release }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Release prelude
        uses: ./.github/actions/release-prelude
        with:
          dry_run: ${{ steps.effective.outputs.dry_run }}
          bot_pat: ${{ secrets.BOT_PAT }}

      - name: Preflight tests
        run: pnpm nx run sdk:test

      - name: Preview version + changelog (dry run)
        if: steps.effective.outputs.dry_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          args=(release --projects=sdk --skip-publish --dry-run --yes)
          if [[ '${{ steps.effective.outputs.first_release }}' = 'true' ]]; then args+=(--first-release); fi
          pnpm nx "${args[@]}"
          npm publish dist/libs/sdk --dry-run --access public --tag alpha

      - name: Release sdk
        if: steps.effective.outputs.dry_run != 'true'
        id: sdk
        uses: ./.github/actions/nx-release-package
        with:
          project: sdk
          package_json_path: libs/sdk/package.json
          dist_path: dist/libs/sdk
          dist_tag: alpha
          npm_access: public
          npm_token: ${{ secrets.NPM_TOKEN }}
          first_release: ${{ steps.effective.outputs.first_release }}
          git_ref: main
