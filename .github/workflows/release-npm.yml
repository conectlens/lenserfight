name: Release npm packages (sdk + adapter-connector)

on:
  push:
    branches:
      - main
    paths:
      - 'libs/sdk/**'
      - 'libs/adapters/connector/**'
      - 'nx.json'
      - '.github/actions/setup-workspace/**'
      - '.github/actions/release-prelude/**'
      - '.github/actions/nx-release-package/**'
      - '.github/workflows/release-npm.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview versioning and npm publish without changing git or npm.
        required: true
        type: boolean
        default: true
      first_release:
        description: Use only for the very first release (no prior nx-managed git tag exists).
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    name: ${{ (inputs.dry_run == 'true' || inputs.dry_run == true) && 'Preview' || 'Publish' }} sdk + adapter-connector
    runs-on: ubuntu-latest
    environment: npm-release

    steps:
      - name: Resolve effective inputs
        id: effective
        shell: bash
        run: |
          echo "dry_run=${{ inputs.dry_run == '' && 'false' || inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          echo "first_release=${{ inputs.first_release == '' && 'false' || inputs.first_release }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Release prelude
        uses: ./.github/actions/release-prelude
        with:
          dry_run: ${{ steps.effective.outputs.dry_run }}
          bot_pat: ${{ secrets.BOT_PAT }}

      - name: Preflight tests
        run: |
          pnpm nx run sdk:test
          pnpm nx run adapters-connector:test

      - name: Preview version + changelog (dry run)
        if: steps.effective.outputs.dry_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          args=(release --projects=sdk,adapters-connector --skip-publish --dry-run --yes)
          if [[ '${{ steps.effective.outputs.first_release }}' = 'true' ]]; then args+=(--first-release); fi
          pnpm nx "${args[@]}"
          npm publish dist/libs/sdk --dry-run --access public --tag alpha
          npm publish dist/libs/adapters/connector --dry-run --access public

      - name: Release sdk
        if: steps.effective.outputs.dry_run != 'true'
        id: sdk
        uses: ./.github/actions/nx-release-package
        with:
          project: sdk
          package_json_path: libs/sdk/package.json
          dist_path: dist/libs/sdk
          dist_tag: alpha
          npm_access: public
          npm_token: ${{ secrets.NPM_TOKEN }}
          first_release: ${{ steps.effective.outputs.first_release }}
          git_ref: main

      - name: Release adapter-connector
        if: steps.effective.outputs.dry_run != 'true'
        id: connector
        uses: ./.github/actions/nx-release-package
        with:
          project: adapters-connector
          package_json_path: libs/adapters/connector/package.json
          dist_path: dist/libs/adapters/connector
          dist_tag: latest
          npm_access: public
          npm_token: ${{ secrets.NPM_TOKEN }}
          first_release: ${{ steps.effective.outputs.first_release }}
          git_ref: main
