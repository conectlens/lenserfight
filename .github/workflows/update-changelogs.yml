name: Auto-update Changelogs on Deploy

on:
  deployment_status:
    types: [completed]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-changelogs:
    name: Update apps/cli and root CHANGELOGs
    # Trigger on manual execution, successful deployments, or non-release commits pushed to main
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success') ||
      (github.event_name == 'push' &&
        !startsWith(github.event.head_commit.message, 'chore(release):') &&
        !startsWith(github.event.head_commit.message, 'chore(changelog):') &&
        !contains(github.event.head_commit.message, '[skip ci]')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Configure Git
        shell: bash
        run: |
          git config user.name 'lenserfight-bot'
          git config user.email 'bot@lenserfight.org'

      - name: Update apps/cli/CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          CLI_VERSION=$(node -p "require('./apps/cli/package.json').version")
          # Capture the most recent tag for the cli package
          PREV_TAG="$(git tag --list 'cli@*' --sort=-version:refname | head -1)"
          
          args=(release changelog "$CLI_VERSION" --projects=cli)
          if [[ -n "$PREV_TAG" ]]; then
            args+=(--from "$PREV_TAG")
          fi
          
          pnpm nx "${args[@]}"

      - name: Update root CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec standard-version --skip.bump --skip.tag --skip.commit

      - name: Commit and Push Changes
        shell: bash
        run: |
          set -euo pipefail
          git add CHANGELOG.md apps/cli/CHANGELOG.md
          
          if git diff --cached --quiet; then
            echo "::notice::No changelog changes detected. Nothing to push."
          else
            git commit -m "chore(changelog): auto-update root and cli changelogs [skip ci]"
            
            # Rebase to survive any concurrent changes on main
            for attempt in 1 2 3; do
              git fetch origin main
              if git rebase origin/main; then
                git push origin HEAD:main && break
              else
                git rebase --abort
                echo "Rebase failed, retrying in 5 seconds..."
                sleep 5
              fi
            done
          fi
