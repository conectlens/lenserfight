name: Claude Code Review

on:
  pull_request:
    types: [review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  claude-review:
    # Only run if the PR review was explicitly requested from the Claude user
    if: >
      github.event.requested_reviewer.login == 'claude'

    runs-on: ubuntu-latest

    steps:
      - name: Check requester permission
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            const requester = context.payload.sender.login;
            const { owner, repo } = context.repo;

            const res = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: requester,
            });

            const permission = res.data.permission;
            const roleName = res.data.role_name;

            core.info(`Requester: ${requester}`);
            core.info(`permission=${permission}, role_name=${roleName}`);

            // Strict admin-only mode
            const allowed = roleName === 'admin' || permission === 'admin';

            core.setOutput('allowed', allowed ? 'true' : 'false');

            if (!allowed) {
              core.setFailed(
                `Claude review is restricted to repository admins. '${requester}' has permission='${permission}', role='${roleName}'.`
              );
            }

      - name: Checkout repository
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

          claude_args: |
            --max-turns 10
            --model sonnet
