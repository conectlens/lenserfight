name: Release SDK

on:
  push:
    tags:
      - 'release-sdk-v*'

permissions:
  contents: write
  id-token: write

jobs:
  release-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build adapter-connector
        run: pnpm nx build adapters-connector

      - name: Test adapter-connector
        run: pnpm nx test adapters-connector --ci

      - name: Publish @lenserfight/adapter-connector to npm
        run: npm publish dist/libs/adapters/connector --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Phase BW — public client SDK alpha
      - name: Build @lenserfight/sdk
        run: pnpm nx build sdk

      - name: Test @lenserfight/sdk
        run: pnpm nx test sdk --ci

      - name: Publish @lenserfight/sdk alpha to npm
        # Use the alpha dist-tag so installs default to the stable line once
        # 1.0.0 lands. Tag promotion is a manual `npm dist-tag add` step.
        run: npm publish dist/libs/sdk --access public --tag alpha --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
