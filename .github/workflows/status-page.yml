name: Generate status page

on:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  generate:
    name: gen-status-page
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate status page
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm gen:status-page

      - name: Commit status page if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/status/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update status page [skip ci]"
            git push
          fi
