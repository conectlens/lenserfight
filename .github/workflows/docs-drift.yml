name: Docs drift

# CLI reference drift gate — fails when committed docs diverge from auto-generation.

on:
  pull_request:
    paths:
      - 'apps/cli/src/commands/**'
      - 'apps/cli/src/main.ts'
      - 'docs/en/reference/cli/**'
      - 'tools/gen-cli-docs.mjs'
      - 'tools/check-cli-docs.mjs'
      - '.github/workflows/docs-drift.yml'
  push:
    branches:
      - main
      - development
    paths:
      - 'apps/cli/src/commands/**'
      - 'apps/cli/src/main.ts'
      - 'docs/en/reference/cli/**'
      - 'tools/gen-cli-docs.mjs'
      - 'tools/check-cli-docs.mjs'

permissions:
  contents: read
  pull-requests: read

jobs:
  cli-docs-drift:
    name: CLI docs drift check (gen-cli-docs --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check CLI docs are up to date
        run: pnpm gen-cli-docs:check

  cli-docs-coverage:
    name: CLI docs coverage check (registered command ↔ markdown page)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify every registered subcommand has a docs page (and vice versa)
        run: pnpm check-cli-docs
