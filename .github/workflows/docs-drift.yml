name: Docs drift

# AA-3: CLI reference drift gate — fails when committed docs diverge from auto-generation.
# AA-5: OpenAPI drift gate — fails when route handler signatures diverge from openapi.yaml.

on:
  pull_request:
    paths:
      - 'apps/cli/src/commands/**'
      - 'apps/platform-api/src/http/**'
      - 'docs/reference/cli/**'
      - 'docs/reference/platform-api/openapi.yaml'
      - 'tools/gen-cli-docs.mjs'
      - 'tools/verify-openapi.mjs'
      - '.github/workflows/docs-drift.yml'
  push:
    branches:
      - main
      - development
    paths:
      - 'apps/cli/src/commands/**'
      - 'apps/platform-api/src/http/**'
      - 'docs/reference/cli/**'
      - 'docs/reference/platform-api/openapi.yaml'
      - 'tools/gen-cli-docs.mjs'
      - 'tools/verify-openapi.mjs'

permissions:
  contents: read
  pull-requests: read

jobs:
  cli-docs-drift:
    name: CLI docs drift check (gen-cli-docs --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check CLI docs are up to date
        run: pnpm gen-cli-docs:check

  openapi-drift:
    name: OpenAPI drift check (verify-openapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check OpenAPI spec matches route handlers
        run: pnpm verify-openapi
