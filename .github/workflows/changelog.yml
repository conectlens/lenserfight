name: Update Changelog

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last tag
        id: last_tag
        run: |
          echo "LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Generate changelog entries
        run: |
          if [ -z "$LAST_TAG" ]; then
            git log --pretty=format:"- %s" > entries.md
          else
            git log $LAST_TAG..HEAD --pretty=format:"- %s" > entries.md
          fi

      - name: Update CHANGELOG
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "Unreleased")

          echo "## [$TAG] - $DATE" > header.md
          cat header.md entries.md CHANGELOG.md > tmp.md
          mv tmp.md CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog"
          git push || true
