name: Sync Contributors

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Check PAT availability
        id: pat
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          if [[ -n "$BOT_PAT" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::BOT_PAT is not set — contributors sync skipped. Set the secret to enable automatic PR creation on protected branches."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update README.md contributors list
        if: steps.pat.outputs.available == 'true'
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        with:
          readme_path: README.md
          use_username: true
          columns_per_row: 6
          commit_message: "docs(contributors): sync contributors in README.md"
          auto_detect_branch_protection: false
          image_size: 100
          collaborators: direct
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}

      - name: Update docs community contributors list
        if: steps.pat.outputs.available == 'true'
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        with:
          readme_path: docs/community/contributors.md
          use_username: true
          columns_per_row: 6
          commit_message: "docs(contributors): sync contributors in docs"
          auto_detect_branch_protection: false
          image_size: 100
          collaborators: direct
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
