name: Sync Contributors

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update contributors list
        uses: akhilmhdh/contributors-readme-action@83ea0b4f1ac928fbfe88b9e8460a932a528eb79f # v2.3.11
        with:
          readme_path: docs/community/contributors.md
          use_username: true
          columns_per_row: 6
          commit_message: "docs(contributors): sync contributors page"
          auto_detect_branch_protection: true
          image_size: 100
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
