name: Sync Contributors

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README.md contributors list
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        with:
          readme_path: README.md
          use_username: true
          columns_per_row: 6
          commit_message: "docs(contributors): sync contributors in README.md"
          auto_detect_branch_protection: true
          image_size: 100
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update docs community contributors list
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        with:
          readme_path: docs/community/contributors.md
          use_username: true
          columns_per_row: 6
          commit_message: "docs(contributors): sync contributors in docs"
          auto_detect_branch_protection: true
          image_size: 100
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
