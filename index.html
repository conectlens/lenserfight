<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LenserFight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#ffde59",
              deep: "#213f74",
              gray: {
                50: '#F9FAFB',
                100: '#F3F4F6',
                200: '#E5E7EB',
                300: '#D1D5DB',
                400: '#9CA3AF',
                500: '#6B7280',
                600: '#4B5563',
                700: '#374151',
                800: '#1F2937',
                900: '#111827',
              }
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      
      /* Utilities for hiding scrollbars */
      .scrollbar-hide {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none; /* Chrome, Safari and Opera */
      }

      /* Global Scrollbar Theme */
      ::-webkit-scrollbar {
          width: 8px;
          height: 8px;
      }
      ::-webkit-scrollbar-track {
          background: #f5f5f5; 
      }
      ::-webkit-scrollbar-thumb {
          background: #d4d4d4;
          border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
          background: #c2c2c2;
      }
      
      /* Firefox */
      * {
          scrollbar-width: thin;
          scrollbar-color: #d4d4d4 #f5f5f5;
      }

      /* Scoped scrollbar for AI Generations & Dropdowns (refined) */
      .generations-scroll {
          scrollbar-width: thin;
          scrollbar-color: #d6d6d6 #f5f5f5;
      }
      .generations-scroll::-webkit-scrollbar {
          width: 6px;
          height: 6px;
      }
      .generations-scroll::-webkit-scrollbar-track {
          background: #f5f5f5;
          border-radius: 4px;
      }
      .generations-scroll::-webkit-scrollbar-thumb {
          background: #d6d6d6;
          border-radius: 4px;
      }
      .generations-scroll::-webkit-scrollbar-thumb:hover {
          background: #c5c5c5;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
