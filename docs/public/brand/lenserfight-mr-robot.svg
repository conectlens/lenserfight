<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1398 180" width="100%" height="auto">
  <defs>
    <!-- Grid Pattern for Tech Vibe in warm/gold shades -->
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#4a3e10" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    
    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background container to ensure readability -->
  <rect width="100%" height="100%" fill="#060c13" rx="12" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="12" />

  <!-- Outer brackets to make it look like a terminal / hacker construct in brand color -->
  <g stroke="#FFDE59" stroke-width="1.5" opacity="0.6">
    <!-- Left bracket -->
    <path d="M 10 10 L 5 10 L 5 170 L 10 170" fill="none" />
    <!-- Right bracket -->
    <path d="M 1388 10 L 1393 10 L 1393 170 L 1388 170" fill="none" />
  </g>

